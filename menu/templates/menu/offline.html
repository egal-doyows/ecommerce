{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Offline — POS</title>
    <link rel="manifest" href="{% static 'manifest.json' %}">
    <link rel="icon" href="{% static 'public_site/img/favicon.ico' %}" sizes="any">
    <link rel="icon" type="image/png" sizes="32x32" href="{% static 'public_site/img/icon-32.png' %}">
    <link rel="icon" type="image/png" sizes="192x192" href="{% static 'public_site/img/icon-192.png' %}">
    <link rel="apple-touch-icon" sizes="180x180" href="{% static 'public_site/img/apple-touch-icon.png' %}">
    <meta name="theme-color" content="#2A1A10">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { font-family: 'Inter', sans-serif; margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #2A1A10; color: #fff; min-height: 100vh;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            padding: 24px; text-align: center;
        }
        .icon { font-size: 64px; margin-bottom: 24px; opacity: 0.6; }
        h1 { font-size: 28px; font-weight: 800; margin-bottom: 12px; }
        p { font-size: 16px; color: rgba(255,255,255,0.6); margin-bottom: 32px; max-width: 400px; }
        .btn {
            display: inline-flex; align-items: center; gap: 8px;
            padding: 12px 24px; border-radius: 12px;
            background: #B83E1E; color: #fff; font-weight: 600; font-size: 14px;
            text-decoration: none; border: none; cursor: pointer;
            transition: all 0.2s;
        }
        .btn:hover { background: #6b72ee; transform: translateY(-1px); }
        .pending { margin-top: 24px; font-size: 13px; color: rgba(255,255,255,0.5); }
        #offline-orders { margin-top: 32px; width: 100%; max-width: 500px; }
        .order-card {
            background: rgba(255,255,255,0.08); border-radius: 12px;
            padding: 16px; margin-bottom: 12px; text-align: left;
        }
        .order-card .header { display: flex; justify-content: space-between; margin-bottom: 8px; }
        .order-card .total { font-weight: 700; color: #B83E1E; }
    </style>
</head>
<body>

    <div class="icon">&#x1F4F6;</div>
    <h1>You're Offline</h1>
    <p>Don't worry — your pending orders are saved and will sync automatically when you're back online.</p>
    <button class="btn" onclick="window.location.reload()">
        &#x1F504; Try Again
    </button>
    <div class="pending" id="pending-count"></div>

    <div id="offline-orders"></div>

    <script src="{% static 'js/pwa.js' %}"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            if (window.POS) {
                const count = await window.POS.getPendingSyncCount();
                if (count > 0) {
                    document.getElementById('pending-count').textContent =
                        count + ' order' + (count > 1 ? 's' : '') + ' waiting to sync';
                }

                const orders = await window.POS.getOfflineOrders();
                const container = document.getElementById('offline-orders');
                const pending = orders.filter(o => o._offline);
                pending.forEach(o => {
                    const div = document.createElement('div');
                    div.className = 'order-card';
                    div.innerHTML = `
                        <div class="header">
                            <span>Table ${o.table_number} &middot; ${o.item_count} items</span>
                            <span class="total">${o.total.toFixed(2)}</span>
                        </div>
                        <div style="font-size:12px;color:rgba(255,255,255,0.4);">
                            Queued ${new Date(o.created_at).toLocaleTimeString()}
                        </div>
                    `;
                    container.appendChild(div);
                });
            }
        });

        window.addEventListener('online', () => window.location.reload());
    </script>
</body>
</html>
