{% extends "menu/base.html" %}
{% load static %}

{% block content %}

<style>
    .verify-wrapper {
        min-height: calc(100vh - 60px);
        display: flex;
        align-items: center;
        justify-content: center;
        background: var(--pos-light);
        padding: 20px;
    }

    .verify-card {
        max-width: 420px;
        background: #fff;
        border-radius: 16px;
        padding: 48px 36px;
        box-shadow: 0 2px 20px rgba(0,0,0,0.08);
        text-align: center;
    }

    .verify-icon {
        width: 64px;
        height: 64px;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        margin: 0 auto 20px;
        font-size: 28px;
    }

    .verify-card h4 {
        font-size: 18px;
        font-weight: 700;
        color: var(--pos-text);
        margin-bottom: 8px;
    }

    .verify-card p {
        font-size: 14px;
        color: var(--pos-muted);
        margin-bottom: 20px;
    }

    .verify-card a {
        display: inline-block;
        padding: 10px 28px;
        background: var(--pos-dark);
        color: #fff;
        border-radius: 10px;
        text-decoration: none;
        font-weight: 600;
        font-size: 14px;
    }
</style>

<div class="verify-wrapper">
    <div class="verify-card">
        <div class="verify-icon" style="background:#e8f5e9; color:#2e7d32;">
            <i class="fa fa-check-circle"></i>
        </div>
        <h4>Account Verified</h4>
        <p>Your account is now active. You can proceed to login.</p>
        <a href="{% url 'my-login' %}">Login</a>
    </div>
</div>

{% endblock %}
