{% extends "administration/base.html" %}

{% block title %}{{ title }}{% endblock %}

{% block content %}
<div class="adm-page-header">
    <div>
        <h1>{{ title }}</h1>
        <div class="breadcrumb-text">
            <a href="{% url 'expense-list' %}" style="color:var(--adm-accent);text-decoration:none;">Expenses</a> /
            <a href="{% url 'expense-category-list' %}" style="color:var(--adm-accent);text-decoration:none;">Categories</a> /
            {{ title }}
        </div>
    </div>
</div>

<form method="POST" style="max-width:500px;">
    {% csrf_token %}

    <div class="adm-card" style="margin-bottom:20px;">
        <div class="adm-form-group" style="margin-bottom:16px;">
            <label class="adm-form-label">Name <span style="color:var(--adm-danger);">*</span></label>
            <input type="text" name="name" value="{{ category.name|default:'' }}" class="adm-input" required placeholder="e.g. Utilities">
        </div>

        <div class="adm-form-group" style="margin-bottom:{% if category %}16px{% else %}0{% endif %};">
            <label class="adm-form-label">Description</label>
            <textarea name="description" class="adm-input" rows="2" placeholder="Optional description...">{{ category.description|default:'' }}</textarea>
        </div>

        {% if category %}
        <div class="adm-form-group" style="margin-bottom:0;">
            <label style="display:flex;align-items:center;gap:8px;cursor:pointer;font-size:13px;">
                <input type="checkbox" name="is_active" {% if category.is_active %}checked{% endif %}>
                Active
            </label>
        </div>
        {% endif %}
    </div>

    <div style="display:flex;gap:10px;">
        <button type="submit" class="adm-btn adm-btn-primary">
            <i class="fa-solid fa-check"></i> {{ action }}
        </button>
        <a href="{% url 'expense-category-list' %}" class="adm-btn adm-btn-outline">Cancel</a>
    </div>
</form>
{% endblock %}
