upstream ecommerce_app {
    server unix:/run/gunicorn-ecommerce.sock fail_timeout=0;
}

server {
    listen 80;
    listen [::]:80;
    server_name __NGINX_SERVER_NAME__;     # substituted by bootstrap.sh from $NGINX_SERVER_NAME in .env

    client_max_body_size 20M;

    # Static files served by whitenoise via gunicorn — no /static/ alias needed.
    # If you ever switch off whitenoise, uncomment:
    # location /static/ {
    #     alias /home/deploy/ecommerce/staticfiles/;
    #     expires 30d;
    #     add_header Cache-Control "public, immutable";
    #     access_log off;
    # }

    # Media files (user uploads) served by nginx for performance.
    location /media/ {
        alias /home/deploy/ecommerce/static/media/;
        expires 7d;
        add_header Cache-Control "public";
    }

    # Service worker — never cache aggressively.
    location = /sw.js {
        proxy_pass http://ecommerce_app;
        add_header Cache-Control "no-cache, must-revalidate";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Health check — no access log noise.
    location = /healthz/ {
        proxy_pass http://ecommerce_app;
        proxy_set_header Host $host;
        access_log off;
    }

    location / {
        proxy_pass http://ecommerce_app;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_redirect off;
        proxy_buffering off;
        proxy_read_timeout 60s;
    }
}
