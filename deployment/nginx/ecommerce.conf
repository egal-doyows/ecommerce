upstream ecommerce_app {
    server unix:/run/gunicorn-ecommerce.sock fail_timeout=0;
}

server {
    listen 80;
    listen [::]:80;
    server_name __NGINX_SERVER_NAME__;     # substituted by bootstrap.sh from $NGINX_SERVER_NAME in .env

    client_max_body_size 20M;

    # Static files served by whitenoise via gunicorn — no /static/ alias needed.
    # If you ever switch off whitenoise, uncomment:
    # location /static/ {
    #     alias /home/deploy/ecommerce/staticfiles/;
    #     expires 30d;
    #     add_header Cache-Control "public, immutable";
    #     access_log off;
    # }

    # Media files (user uploads) served by nginx for performance.
    # Default policy: force-download + sandbox + nosniff so an attacker
    # can't smuggle stored XSS via a malicious upload (HTML, SVG, etc).
    # Safe raster image types are exempted in the nested block below so
    # menu photos / restaurant logo render inline as <img>.
    location /media/ {
        alias /home/deploy/ecommerce/media/;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Content-Disposition "attachment" always;
        add_header Content-Security-Policy "default-src 'none'; sandbox" always;
        add_header Cache-Control "public" always;
        expires 7d;

        # Inline-display exemption for safe raster image extensions.
        # Note: nginx add_header in a nested location REPLACES (not merges
        # with) the parent's, so omitting Content-Disposition here leaves
        # the response without one — browsers default to inline rendering.
        # SVG is intentionally NOT in this list (can carry script).
        location ~* \.(jpg|jpeg|png|gif|webp|ico)$ {
            add_header X-Content-Type-Options "nosniff" always;
            add_header Cache-Control "public" always;
            expires 30d;
        }
    }

    # Service worker — never cache aggressively.
    location = /sw.js {
        proxy_pass http://ecommerce_app;
        add_header Cache-Control "no-cache, must-revalidate";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Health check — no access log noise.
    location = /healthz/ {
        proxy_pass http://ecommerce_app;
        proxy_set_header Host $host;
        access_log off;
    }

    location / {
        proxy_pass http://ecommerce_app;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_redirect off;
        proxy_buffering off;
        proxy_read_timeout 60s;
    }
}
