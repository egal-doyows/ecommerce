{% extends "administration/base.html" %}

{% block title %}{{ title }}{% endblock %}

{% block content %}
<div class="adm-page-header">
    <div>
        <h1>{{ title }}</h1>
        <div class="breadcrumb-text">
            <a href="{% url 'hr-dashboard' %}" style="color:var(--adm-accent);text-decoration:none;">HR</a> /
            <a href="{% url 'hr-leave-type-list' %}" style="color:var(--adm-accent);text-decoration:none;">Leave Types</a> /
            {{ title }}
        </div>
    </div>
</div>

<form method="POST" style="max-width:500px;">
    {% csrf_token %}
    <div class="adm-card" style="margin-bottom:20px;">
        <div class="adm-form-group">
            <label class="adm-form-label">Name <span style="color:var(--adm-danger);">*</span></label>
            <input type="text" name="name" class="adm-input" required
                   value="{% if lt %}{{ lt.name }}{% endif %}" placeholder="e.g. Annual Leave">
        </div>
        <div class="adm-form-group">
            <label class="adm-form-label">Days Allowed Per Year</label>
            <input type="number" name="days_allowed" class="adm-input" min="0"
                   value="{% if lt %}{{ lt.days_allowed }}{% else %}0{% endif %}">
            <div class="adm-help-text">Set to 0 for unlimited.</div>
        </div>
        <div class="adm-form-group">
            <label style="display:flex;align-items:center;gap:8px;cursor:pointer;font-size:13px;">
                <input type="checkbox" name="is_paid" {% if lt %}{% if lt.is_paid %}checked{% endif %}{% else %}checked{% endif %}>
                Paid Leave
            </label>
        </div>
        {% if lt %}
        <div class="adm-form-group" style="margin-bottom:0;">
            <label style="display:flex;align-items:center;gap:8px;cursor:pointer;font-size:13px;">
                <input type="checkbox" name="is_active" {% if lt.is_active %}checked{% endif %}>
                Active
            </label>
        </div>
        {% endif %}
    </div>

    <div style="display:flex;gap:10px;">
        <button type="submit" class="adm-btn adm-btn-primary">
            <i class="fa-solid fa-check"></i> {{ action }}
        </button>
        <a href="{% url 'hr-leave-type-list' %}" class="adm-btn adm-btn-outline">Cancel</a>
    </div>
</form>
{% endblock %}
