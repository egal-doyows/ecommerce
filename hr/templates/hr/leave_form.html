{% extends "administration/base.html" %}

{% block title %}{{ title }}{% endblock %}

{% block content %}
<div class="adm-page-header">
    <div>
        <h1>{{ title }}</h1>
        <div class="breadcrumb-text">
            <a href="{% url 'hr-dashboard' %}" style="color:var(--adm-accent);text-decoration:none;">HR</a> /
            <a href="{% url 'hr-leave-list' %}" style="color:var(--adm-accent);text-decoration:none;">Leave</a> /
            {{ title }}
        </div>
    </div>
</div>

<form method="POST" style="max-width:600px;">
    {% csrf_token %}
    <div class="adm-card" style="margin-bottom:20px;">
        {% if is_manager and employees %}
        <div class="adm-form-group">
            <label class="adm-form-label">Employee <span style="color:var(--adm-danger);">*</span></label>
            <select name="employee" class="adm-input" required>
                <option value="">— Select employee —</option>
                {% for emp in employees %}
                <option value="{{ emp.pk }}">{{ emp.full_name }} ({{ emp.employee_id }})</option>
                {% endfor %}
            </select>
        </div>
        {% endif %}

        <div class="adm-form-group">
            <label class="adm-form-label">Leave Type <span style="color:var(--adm-danger);">*</span></label>
            <select name="leave_type" class="adm-input" required>
                <option value="">— Select leave type —</option>
                {% for lt in leave_types %}
                <option value="{{ lt.pk }}">
                    {{ lt.name }}{% if lt.is_paid %} (Paid){% else %} (Unpaid){% endif %}{% if lt.days_allowed > 0 %} — {{ lt.days_allowed }} days/yr{% endif %}
                </option>
                {% endfor %}
            </select>
        </div>

        <div style="display:flex;gap:16px;flex-wrap:wrap;margin-bottom:16px;">
            <div class="adm-form-group" style="flex:1;min-width:160px;margin-bottom:0;">
                <label class="adm-form-label">Start Date <span style="color:var(--adm-danger);">*</span></label>
                <input type="date" name="start_date" class="adm-input" required value="{{ today }}">
            </div>
            <div class="adm-form-group" style="flex:1;min-width:160px;margin-bottom:0;">
                <label class="adm-form-label">End Date <span style="color:var(--adm-danger);">*</span></label>
                <input type="date" name="end_date" class="adm-input" required value="{{ today }}">
            </div>
        </div>

        <div id="dayCount" style="padding:8px 12px;background:rgba(99,102,241,.05);border-radius:6px;font-size:12px;color:var(--adm-accent);font-weight:600;margin-bottom:16px;display:none;">
            <i class="fa-solid fa-calendar-days" style="margin-right:4px;"></i> <span id="dayText"></span>
        </div>

        <div class="adm-form-group" style="margin-bottom:0;">
            <label class="adm-form-label">Reason</label>
            <textarea name="reason" class="adm-input" rows="3" placeholder="Briefly describe the reason for leave..."></textarea>
        </div>
    </div>

    <div style="display:flex;gap:10px;">
        <button type="submit" class="adm-btn adm-btn-primary">
            <i class="fa-solid fa-paper-plane"></i> Submit Request
        </button>
        <a href="{% url 'hr-leave-list' %}" class="adm-btn adm-btn-outline">Cancel</a>
    </div>
</form>

<script>
(function(){
    const startEl = document.querySelector('[name="start_date"]');
    const endEl = document.querySelector('[name="end_date"]');
    const countEl = document.getElementById('dayCount');
    const textEl = document.getElementById('dayText');

    function update(){
        const s = startEl.value, e = endEl.value;
        if(s && e){
            const diff = Math.round((new Date(e) - new Date(s)) / 86400000) + 1;
            if(diff > 0){
                textEl.textContent = diff + ' day' + (diff !== 1 ? 's' : '');
                countEl.style.display = 'block';
            } else {
                countEl.style.display = 'none';
            }
        } else {
            countEl.style.display = 'none';
        }
    }
    startEl.addEventListener('change', update);
    endEl.addEventListener('change', update);
    update();
})();
</script>
{% endblock %}
