{% extends "administration/base.html" %}

{% block title %}{{ title }}{% endblock %}

{% block content %}
<div class="adm-page-header">
    <div>
        <h1>{{ title }}</h1>
        <div class="breadcrumb-text">
            <a href="{% url 'hr-dashboard' %}" style="color:var(--adm-accent);text-decoration:none;">HR</a> /
            <a href="{% url 'hr-department-list' %}" style="color:var(--adm-accent);text-decoration:none;">Departments</a> /
            {{ title }}
        </div>
    </div>
</div>

<form method="POST" style="max-width:550px;">
    {% csrf_token %}
    <div class="adm-card" style="margin-bottom:20px;">
        <div class="adm-form-group">
            <label class="adm-form-label">Department Name <span style="color:var(--adm-danger);">*</span></label>
            <input type="text" name="name" class="adm-input" required
                   value="{% if dept %}{{ dept.name }}{% endif %}" placeholder="e.g. Kitchen">
        </div>
        <div class="adm-form-group">
            <label class="adm-form-label">Description</label>
            <textarea name="description" class="adm-input" rows="2" placeholder="Brief description...">{% if dept %}{{ dept.description }}{% endif %}</textarea>
        </div>
        <div class="adm-form-group">
            <label class="adm-form-label">Department Head</label>
            <select name="head" class="adm-input">
                <option value="">— None —</option>
                {% for m in managers %}
                <option value="{{ m.pk }}" {% if dept and dept.head_id == m.pk %}selected{% endif %}>
                    {{ m.get_full_name|default:m.username }}
                </option>
                {% endfor %}
            </select>
        </div>
        {% if dept %}
        <div class="adm-form-group" style="margin-bottom:0;">
            <label style="display:flex;align-items:center;gap:8px;cursor:pointer;font-size:13px;">
                <input type="checkbox" name="is_active" {% if dept.is_active %}checked{% endif %}>
                Active
            </label>
        </div>
        {% endif %}
    </div>

    <div style="display:flex;gap:10px;">
        <button type="submit" class="adm-btn adm-btn-primary">
            <i class="fa-solid fa-check"></i> {{ action }}
        </button>
        <a href="{% url 'hr-department-list' %}" class="adm-btn adm-btn-outline">Cancel</a>
    </div>
</form>
{% endblock %}
